<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="navyGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003DA5"/>
      <stop offset="100%" stop-color="#00205B"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDB913"/>
      <stop offset="100%" stop-color="#F7941E"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00205B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Hexagonal badge -->
  <polygon points="100,8 188,52 188,168 100,212 12,168 12,52"
           fill="url(#navyGrad2)" stroke="url(#goldGrad2)" stroke-width="6"
           stroke-linejoin="round" filter="url(#iconShadow)"/>
  <polygon points="100,22 174,60 174,160 100,198 26,160 26,60"
           fill="none" stroke="#FDB913" stroke-width="1.4" stroke-opacity="0.45"/>
  <circle cx="100" cy="32" r="3" fill="#FDB913"/>

  <!-- Mounting bracket -->
  <rect x="86" y="38" width="28" height="10" rx="2" fill="#FDB913"/>
  <rect x="92" y="46" width="16" height="6" fill="#F7941E"/>

  <!-- Hose -->
  <path d="M 100 52 C 100 80, 60 90, 56 120 C 54 145, 78 160, 100 158 C 122 156, 134 138, 132 122"
        fill="none" stroke="#FDB913" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 100 56 C 100 80, 64 90, 60 120 C 58 142, 78 154, 100 153"
        fill="none" stroke="#FFD75A" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Nozzle -->
  <g transform="translate(132 122) rotate(35)">
    <rect x="-6" y="-4" width="34" height="10" rx="2" fill="#FDB913"/>
    <rect x="28" y="-2" width="14" height="6" rx="1" fill="#F7941E"/>
    <path d="M -2 6 Q -2 22, 14 22 L 18 22 Q 22 22, 22 16" fill="none" stroke="#FDB913" stroke-width="3" stroke-linecap="round"/>
    <rect x="6" y="6" width="8" height="14" rx="1" fill="#F7941E"/>
    <circle cx="48" cy="2" r="2.5" fill="#FFD75A"/>
    <ellipse cx="50" cy="9" rx="2" ry="3" fill="#FFD75A" opacity="0.7"/>
  </g>
</svg>
